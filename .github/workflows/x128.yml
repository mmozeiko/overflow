
name: x128

on:
  workflow_dispatch: {}
  push:
    branches: [ 'main' ]
    paths:    [ 'x128/*' ]

jobs:
  x128:

    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows, cc: msvc,  arch: x64,    runs: windows-2025          }
          - { os: windows, cc: clang, arch: x64,    runs: windows-2025          }   
          - { os: windows, cc: msvc,  arch: arm64,  runs: windows-11-vs2026-arm }
          - { os: windows, cc: clang, arch: arm64,  runs: windows-11-vs2026-arm }
          - { os: linux,   cc: clang, arch: x64,    runs: ubuntu-26.04          }
          - { os: linux,   cc: gcc,   arch: x64,    runs: ubuntu-26.04          }
          - { os: linux,   cc: clang, arch: arm64,  runs: ubuntu-26.04-arm      }
          - { os: linux,   cc: gcc,   arch: arm64,  runs: ubuntu-26.04-arm      }
          - { os: linux,   cc: clang, arch: rv64,   runs: ubuntu-26.04          }
          - { os: linux,   cc: gcc,   arch: rv64,   runs: ubuntu-26.04          }
          - { os: macos,   cc: clang, arch: x64,    runs: macos-26-intel        }
          - { os: macos,   cc: clang, arch: arm64,  runs: macos-26              }
          - { os: mingw,   cc: clang, arch: x64,    runs: ubuntu-26.04          }
          - { os: mingw,   cc: gcc,   arch: x64,    runs: ubuntu-26.04          }
          - { os: wasi,    cc: clang, arch: wasm32, runs: ubuntu-26.04          }

    name: ${{ matrix.os }}-${{ matrix.cc }}-${{ matrix.arch }}

    runs-on: ${{ matrix.runs }}

    steps:

      - uses: actions/checkout@v6

      - uses: ./.github/workflows/shared
        with:
          os: ${{ matrix.os }}
          cc: ${{ matrix.cc }}
          arch: ${{ matrix.arch }}

      - name: generate tests
        run: python x128/x128_test_gen.py

      - if: ${{ matrix.os == 'windows' }}
        shell: cmd
        run: |
          call scripts\xrun.cmd x128\x128_test.c "${{ matrix.os }}" "${{ matrix.cc }}" "${{ matrix.arch }}" c++ norun          || exit /b 1
          call scripts\xrun.cmd x128\x128_test.c "${{ matrix.os }}" "${{ matrix.cc }}" "${{ matrix.arch }}" c                  || exit /b 1
          call scripts\xrun.cmd x128\x128_test.c "${{ matrix.os }}" "${{ matrix.cc }}" "${{ matrix.arch }}" c -DX128_NO_INT128 || exit /b 1

      - if: ${{ matrix.os != 'windows' }}
        shell: bash
        run: |
          scripts/xrun.sh x128/x128_test.c "${{ matrix.os }}" "${{ matrix.cc }}" "${{ matrix.arch }}" c++ norun
          scripts/xrun.sh x128/x128_test.c "${{ matrix.os }}" "${{ matrix.cc }}" "${{ matrix.arch }}" c
          scripts/xrun.sh x128/x128_test.c "${{ matrix.os }}" "${{ matrix.cc }}" "${{ matrix.arch }}" c -DX128_NO_INT128
